<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Steering Wheel</title>
    <style>
        :root {
            --bg-deep: #0d0d0d;
            --bg-panel: #141414;
            --accent: #E4002B;
            --accent-dim: #8B0018;
            --text-main: #FFFFFF;
            --text-sub: #888888;
            --green: #2ECC71;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: var(--bg-panel);
            border-bottom: 2px solid var(--accent);
        }

        .title {
            font-weight: bold;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: var(--text-sub);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--accent); /* Red when disconnected */
        }
        
        .status-dot.connected {
            background-color: var(--green);
        }

        /* Main Content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Steering Visualizer */
        .steering-container {
            width: 80%;
            height: 20px;
            background-color: var(--bg-panel);
            border-radius: 10px;
            position: relative;
            margin-bottom: 40px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }

        .steering-center {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            width: 2px;
            background-color: var(--text-sub);
            transform: translateX(-50%);
        }

        .steering-indicator {
            position: absolute;
            top: -5px;
            left: 50%;
            width: 30px;
            height: 30px;
            background-color: var(--accent);
            border-radius: 50%;
            transform: translateX(-50%);
            transition: left 0.1s ease-out;
            box-shadow: 0 0 10px var(--accent);
        }

        .angle-text {
            font-family: 'Consolas', monospace;
            font-size: 2rem;
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 20px;
        }

        /* Controls */
        .controls {
            display: flex;
            width: 100%;
            justify-content: space-around;
            padding: 20px;
            gap: 20px;
        }

        .gear-btn {
            flex: 1;
            aspect-ratio: 1;
            max-width: 150px;
            background-color: var(--bg-panel);
            border: 2px solid #2a2a2a;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--text-sub);
            transition: all 0.1s;
            cursor: pointer;
        }

        .gear-btn:active {
            background-color: var(--accent-dim);
            color: var(--text-main);
            border-color: var(--accent);
            transform: scale(0.95);
        }

        /* Overlay */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(13, 13, 13, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .btn-start {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            background-color: var(--accent);
            color: var(--text-main);
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .btn-start:active {
            background-color: var(--accent-dim);
        }

    </style>
</head>
<body>

    <header>
        <div class="title">MOBILE WHEEL</div>
        <div class="status">
            <div id="statusDot" class="status-dot"></div>
            <span id="statusText">DISCONNECTED</span>
        </div>
    </header>

    <div class="main">
        <div id="overlay" class="overlay">
            <p style="margin-bottom: 20px; text-align: center; color: var(--text-sub);">
                Tap below to enable Gyroscope & Connection<br>
                (Keep phone horizontal like a steering wheel)
            </p>
            <button id="btnStart" class="btn-start">START DRIVING</button>
        </div>

        <div id="angleText" class="angle-text">0.0°</div>
        
        <div class="steering-container">
            <div class="steering-center"></div>
            <div id="steerIndicator" class="steering-indicator"></div>
        </div>

        <div class="controls">
            <div id="btnGearDown" class="gear-btn">-</div>
            <div id="btnGearUp" class="gear-btn">+</div>
        </div>
    </div>

    <script>
        let ws;
        let isConnected = false;
        let steeringAngle = 0;
        const MAX_STEER_ANGLE = 90; // degrees for max turn on phone

        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const overlay = document.getElementById('overlay');
        const btnStart = document.getElementById('btnStart');
        const steerIndicator = document.getElementById('steerIndicator');
        const angleText = document.getElementById('angleText');
        
        const btnGearUp = document.getElementById('btnGearUp');
        const btnGearDown = document.getElementById('btnGearDown');

        let isGearUpPressed = false;
        let isGearDownPressed = false;

        function connectWebSocket() {
            // Assume WebSocket server is running on port 8765 on the same host
            const wsUrl = `ws://${window.location.hostname}:8765`;
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                isConnected = true;
                statusDot.classList.add('connected');
                statusText.innerText = 'CONNECTED';
                overlay.style.display = 'none';
            };

            ws.onclose = () => {
                isConnected = false;
                statusDot.classList.remove('connected');
                statusText.innerText = 'DISCONNECTED';
                setTimeout(connectWebSocket, 2000); // Reconnect loop
            };

            ws.onerror = (err) => {
                console.error("WebSocket Error:", err);
            };
        }

        function handleOrientation(event) {
            // Use gamma (left-to-right tilt in portrait) or beta (in landscape)
            // Assuming phone is held in landscape mode like a steering wheel:
            // event.beta is front-to-back tilt in portrait, but in landscape it's the steering rotation!
            
            // Let's rely on standard orientation handling. When held landscape:
            // beta is rotation around the short axis (steering).
            // Actually, in landscape, 'beta' is steering if locked. Let's use beta.
            // Depending on device and orientation lock, this might vary. 
            // A common robust way for steering wheel:
            
            let angle = event.beta; 
            
            // If device is in portrait, gamma is steering.
            // Let's check screen orientation
            let orientation = (screen.orientation || {}).type || screen.mozOrientation || screen.msOrientation;
            
            if (orientation === "landscape-primary" || orientation === "landscape-secondary" || Math.abs(window.orientation) === 90) {
                angle = event.beta;
                // invert if landscape-secondary
                if (orientation === "landscape-secondary" || window.orientation === -90) {
                    angle = -angle;
                }
            } else {
                // Portrait
                angle = event.gamma;
            }

            if (angle === null) return; // No sensor

            // Clamp and process
            if (angle > MAX_STEER_ANGLE) angle = MAX_STEER_ANGLE;
            if (angle < -MAX_STEER_ANGLE) angle = -MAX_STEER_ANGLE;
            
            steeringAngle = angle;
            updateUI();
            sendTelemetry();
        }

        function updateUI() {
            // Update indicator position
            // map -90..90 to 0%..100%
            let percent = ((steeringAngle + MAX_STEER_ANGLE) / (MAX_STEER_ANGLE * 2)) * 100;
            steerIndicator.style.left = `${percent}%`;
            angleText.innerText = `${steeringAngle.toFixed(1)}°`;
        }

        function sendTelemetry() {
            if (isConnected && ws.readyState === WebSocket.OPEN) {
                const data = {
                    steer: steeringAngle,
                    gearUp: isGearUpPressed ? 1 : 0,
                    gearDown: isGearDownPressed ? 1 : 0
                };
                ws.send(JSON.stringify(data));
            }
        }

        // Button Event Listeners
        const setupButton = (btn, stateVarCallback) => {
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                stateVarCallback(true);
                sendTelemetry();
            });
            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                stateVarCallback(false);
                sendTelemetry();
            });
            btn.addEventListener('mousedown', (e) => {
                stateVarCallback(true);
                sendTelemetry();
            });
            btn.addEventListener('mouseup', (e) => {
                stateVarCallback(false);
                sendTelemetry();
            });
            btn.addEventListener('mouseleave', (e) => {
                stateVarCallback(false);
                sendTelemetry();
            });
        };

        setupButton(btnGearUp, (val) => isGearUpPressed = val);
        setupButton(btnGearDown, (val) => isGearDownPressed = val);

        btnStart.addEventListener('click', () => {
            // Request permission for iOS 13+ devices
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation);
                        } else {
                            alert("Gyroscope permission denied.");
                        }
                    })
                    .catch(console.error);
            } else {
                // Non iOS 13+ devices
                window.addEventListener('deviceorientation', handleOrientation);
            }
            
            connectWebSocket();
            btnStart.innerText = "CONNECTING...";
            
            // Periodically send data even if orientation doesn't change
            setInterval(sendTelemetry, 50); 
        });

        // Prevent context menu
        window.oncontextmenu = function(event) {
             event.preventDefault();
             event.stopPropagation();
             return false;
        };
    </script>
</body>
</html>
