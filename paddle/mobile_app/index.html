<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Mobile Steering Wheel</title>
<style>
    :root {
        --bg-deep: #0d0d0d;
        --bg-panel: #141414;
        --bg-card: #1a1a1a;
        --accent: #E4002B;
        --accent-dim: #8B0018;
        --text-main: #FFFFFF;
        --text-sub: #888888;
        --green: #2ECC71;
        --border: #2a2a2a;
    }

    * {
        box-sizing: border-box;
        user-select: none;
        -webkit-user-select: none;
        -webkit-tap-highlight-color: transparent;
    }

    body {
        margin: 0;
        padding: 0;
        background-color: var(--bg-deep);
        color: var(--text-main);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        flex-direction: column;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
        touch-action: manipulation;
    }

    /* Header */
    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 20px;
        background-color: var(--bg-panel);
        border-bottom: 2px solid var(--accent);
        flex-shrink: 0;
    }

    .title {
        font-weight: bold;
        font-size: 1.1rem;
        letter-spacing: 1px;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .btn-fullscreen {
        background: var(--bg-card);
        border: 1px solid var(--border);
        color: var(--text-main);
        padding: 6px 14px;
        border-radius: 6px;
        font-size: 0.8rem;
        font-weight: bold;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
        transition: all 0.1s;
    }

    .btn-fullscreen:active {
        background: var(--accent);
        border-color: var(--accent);
    }

    .status {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.85rem;
        color: var(--text-sub);
    }

    .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background-color: var(--accent);
    }
    
    .status-dot.connected {
        background-color: var(--green);
        box-shadow: 0 0 8px var(--green);
    }

    /* Main Content */
    .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-around;
        padding: 20px;
        position: relative;
    }

    /* Steering Angle & Bar */
    .steering-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        max-width: 500px;
    }

    .angle-text {
        font-family: 'Consolas', monospace;
        font-size: 2.8rem;
        font-weight: bold;
        color: var(--accent);
        text-shadow: 0 0 15px rgba(228, 0, 43, 0.4);
        margin-bottom: 12px;
    }

    .steering-container {
        width: 90%;
        height: 16px;
        background-color: var(--bg-panel);
        border-radius: 8px;
        position: relative;
        box-shadow: inset 0 2px 5px rgba(0,0,0,0.6);
        border: 1px solid var(--border);
    }

    .steering-center {
        position: absolute;
        top: 0;
        bottom: 0;
        left: 50%;
        width: 2px;
        background-color: var(--text-sub);
        transform: translateX(-50%);
    }

    .steering-indicator {
        position: absolute;
        top: -4px;
        left: 50%;
        width: 24px;
        height: 24px;
        background-color: var(--accent);
        border-radius: 50%;
        transform: translateX(-50%);
        transition: left 0.05s ease-out;
        box-shadow: 0 0 12px var(--accent);
    }

    /* Gear Controls */
    .controls {
        display: flex;
        width: 100%;
        max-width: 600px;
        justify-content: center;
        gap: 24px;
        flex: 1;
        max-height: 220px;
        margin-top: 10px;
    }

    .gear-btn {
        flex: 1;
        background-color: var(--bg-panel);
        border: 2px solid var(--border);
        border-radius: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-size: 3.5rem;
        font-weight: bold;
        color: var(--text-sub);
        transition: all 0.08s ease;
        cursor: pointer;
        box-shadow: 0 6px 15px rgba(0,0,0,0.4);
    }

    .gear-btn span.label {
        font-size: 0.85rem;
        font-weight: 600;
        letter-spacing: 2px;
        color: var(--text-sub);
        margin-top: 4px;
    }

    .gear-btn:active, .gear-btn.active {
        background-color: var(--accent-dim);
        color: var(--text-main);
        border-color: var(--accent);
        transform: scale(0.96);
        box-shadow: 0 0 20px rgba(228, 0, 43, 0.5);
    }

    .gear-btn:active span.label, .gear-btn.active span.label {
        color: var(--text-main);
    }

    /* Start Overlay */
    .overlay {
        position: absolute;
        inset: 0;
        background: rgba(13, 13, 13, 0.95);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 100;
        backdrop-filter: blur(5px);
    }

    .btn-start {
        padding: 16px 48px;
        font-size: 1.2rem;
        font-weight: bold;
        letter-spacing: 1px;
        background-color: var(--accent);
        color: var(--text-main);
        border: none;
        border-radius: 8px;
        cursor: pointer;
        box-shadow: 0 0 20px rgba(228, 0, 43, 0.6);
        transition: background 0.15s;
    }
    
    .btn-start:active {
        background-color: var(--accent-dim);
    }

</style>
</head>
<body>

    <header>
        <div class="title">
            <span>MOBILE WHEEL</span>
            <button id="btnFullscreen" class="btn-fullscreen">⛶ FULLSCREEN</button>
        </div>
        <div class="status">
            <div id="statusDot" class="status-dot"></div>
            <span id="statusText">DISCONNECTED</span>
        </div>
    </header>

    <div class="main">
        <!-- Start Overlay -->
        <div id="overlay" class="overlay">
            <p style="margin-bottom: 24px; text-align: center; color: var(--text-sub); line-height: 1.6;">
                Tap below to enable Gyroscope & Connection<br>
                (Hold phone horizontally like a steering wheel)
            </p>
            <button id="btnStart" class="btn-start">START DRIVING</button>
        </div>

        <!-- Steering Readout -->
        <div class="steering-section">
            <div id="angleText" class="angle-text">0.0°</div>
            <div class="steering-container">
                <div class="steering-center"></div>
                <div id="steerIndicator" class="steering-indicator"></div>
            </div>
        </div>

        <!-- Gear Shift Buttons -->
        <div class="controls">
            <div id="btnGearDown" class="gear-btn">
                −
                <span class="label">SHIFT DOWN</span>
            </div>
            <div id="btnGearUp" class="gear-btn">
                +
                <span class="label">SHIFT UP</span>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let isConnected = false;
        let steeringAngle = 0;
        const MAX_STEER_ANGLE = 90; // degrees

        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const overlay = document.getElementById('overlay');
        const btnStart = document.getElementById('btnStart');
        const btnFullscreen = document.getElementById('btnFullscreen');
        
        const steerIndicator = document.getElementById('steerIndicator');
        const angleText = document.getElementById('angleText');
        
        const btnGearUp = document.getElementById('btnGearUp');
        const btnGearDown = document.getElementById('btnGearDown');

        let isGearUpPressed = false;
        let isGearDownPressed = false;

        // Fullscreen Trigger
        btnFullscreen.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else {
                document.exitFullscreen().catch(() => {});
            }
        });

        function connectWebSocket() {
            const wsUrl = `ws://${window.location.hostname}:8765`;
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                isConnected = true;
                statusDot.classList.add('connected');
                statusText.innerText = 'CONNECTED';
                overlay.style.display = 'none';
            };

            ws.onclose = () => {
                isConnected = false;
                statusDot.classList.remove('connected');
                statusText.innerText = 'DISCONNECTED';
                setTimeout(connectWebSocket, 1500);
            };

            ws.onerror = (err) => {
                if (ws) ws.close();
            };
        }

        function handleOrientation(event) {
            let angle = 0;
            const orient = (screen.orientation || {}).type || '';
            const winOr = typeof window.orientation !== 'undefined' ? window.orientation : null;
            const isLandscape = orient.includes('landscape') || (winOr !== null && Math.abs(winOr) === 90);

            if (isLandscape) {
                angle = event.beta ?? 0;
                if (orient === 'landscape-secondary' || winOr === -90) angle = -angle;
            } else {
                angle = event.gamma ?? 0;
            }

            // Clamp -90..90
            angle = Math.max(-MAX_STEER_ANGLE, Math.min(MAX_STEER_ANGLE, angle));
            steeringAngle = angle;
            
            updateUI();
            sendTelemetry();
        }

        function updateUI() {
            let percent = ((steeringAngle + MAX_STEER_ANGLE) / (MAX_STEER_ANGLE * 2)) * 100;
            steerIndicator.style.left = `${percent}%`;
            angleText.innerText = `${steeringAngle >= 0 ? '+' : ''}${steeringAngle.toFixed(1)}°`;
        }

        function sendTelemetry() {
            if (isConnected && ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    steer: steeringAngle,
                    gearUp: isGearUpPressed ? 1 : 0,
                    gearDown: isGearDownPressed ? 1 : 0,
                    steerEnabled: true
                }));
            }
        }

        // Button Event Listeners
        function setupButton(btn, stateVarCallback) {
            const press = (e) => {
                e.preventDefault();
                stateVarCallback(true);
                btn.classList.add('active');
                if (navigator.vibrate) navigator.vibrate(30);
                sendTelemetry();
            };
            const release = (e) => {
                e.preventDefault();
                stateVarCallback(false);
                btn.classList.remove('active');
                sendTelemetry();
            };

            btn.addEventListener('touchstart', press, { passive: false });
            btn.addEventListener('touchend', release, { passive: false });
            btn.addEventListener('touchcancel', release, { passive: false });
            btn.addEventListener('mousedown', press);
            btn.addEventListener('mouseup', release);
            btn.addEventListener('mouseleave', release);
        }

        setupButton(btnGearUp, (val) => isGearUpPressed = val);
        setupButton(btnGearDown, (val) => isGearDownPressed = val);

        btnStart.addEventListener('click', () => {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation, { passive: true });
                        }
                    })
                    .catch(console.error);
            } else {
                window.addEventListener('deviceorientation', handleOrientation, { passive: true });
            }
            
            connectWebSocket();
            btnStart.innerText = "CONNECTING...";
            
            setInterval(sendTelemetry, 50); 
        });

        // Prevent context menu & pull-to-refresh
        window.oncontextmenu = function(e) { e.preventDefault(); };
        document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
    </script>
</body>
</html>
